<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grades</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fdf0f8 0%, #f5e6f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 50px 60px;
            box-shadow: 0 20px 60px rgba(128, 15, 94, 0.15);
            text-align: center;
            max-width: 480px;
            width: 90%;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon { font-size: 70px; margin-bottom: 10px; }
        .greeting { font-size: 1rem; color: #888; margin-bottom: 5px; }

        .student-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #800f5e;
            margin-bottom: 30px;
        }

        .score {
            font-size: 3rem;
            font-weight: 700;
            color: #800f5e;
            margin-bottom: 5px;
        }

        .score-label { font-size: 0.95rem; color: #888; margin-bottom: 35px; }

        .btn-home {
            background-color: #800f5e;
            color: white;
            border: none;
            padding: 13px 40px;
            border-radius: 25px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s ease;
        }

        .btn-home:hover { background-color: #6a0c4e; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎉</div>
        <p class="greeting">Well done,</p>
        <h2 class="student-name" id="studentName">Student</h2>
        <div class="score" id="scoreText">0/10</div>
        <p class="score-label">Your Score</p>
        <a href="index.html" class="btn-home">Back to Login</a>
    </div>

    <script>
        const users = JSON.parse(localStorage.getItem("users")) || [];
        const currentUserEmail = localStorage.getItem("currentUser");
        const currentUser = users.find(u => u.email === currentUserEmail);

        const score = localStorage.getItem("examScore") || 0;
        const total = localStorage.getItem("examTotal") || 10;

        if (currentUser) {
            document.getElementById("studentName").textContent =
                currentUser.firstName + " " + currentUser.lastName;
        }

        document.getElementById("scoreText").textContent = `${score} / ${total}`;
    </script>
</body>
</html>
