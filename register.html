<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="card p-4 shadow">
        <h3 class="text-center mb-4">Register</h3>

        <form id="registerForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label>First Name</label>
              <input type="text" id="firstName" class="form-control" placeholder="Enter your first name"  />
              <div class="text-danger small" mr-2 id="firstNameError"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label>Last Name</label>
              <input type="text" id="lastName" class="form-control" placeholder="Enter your last name"  />
              <div class="text-danger small" id="lastNameError"></div>
            </div>
          </div>

          <div class="mb-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control" placeholder="example@gmail.com"  />
            <div class="text-danger small" id="emailError"></div>
          </div>

          <div class="mb-3">
            <label>Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter your password"  />
            <div class="text-danger small" id="passwordError"></div>
          </div>

          <div class="mb-3">
            <label>Re-enter Password</label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter your password"  />
            <div class="text-danger small" id="confirmPasswordError"></div>
          </div>

          <button class="btn-submit btn btn-primary w-100" type="submit">Register</button>
        </form>
      </div>
    </div>

    <script src="register.js"></script>
  </body>
</html>
