<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Login</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container">
    <div class="row justify-content-center align-items-center vh-100">
      <div class="col-md-5">

        <div class="card shadow p-4">
          <h3 class="text-center mb-4">Login</h3>

          <form id="loginForm">

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label">Email address</label>
              <input type="email" id="loginEmail" class="form-control" placeholder="example@gmail.com">
              <div id="loginEmailError" class="text-danger small mt-1"></div>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password">
              <div id="loginPasswordError" class="text-danger small mt-1"></div>
            </div>

            <button type="submit" class="btn-submit btn btn-primary w-100"> Login </button>

          </form>

          <p class="text-center mt-3">
            Don't have an account?
            <a href="register.html" class="form-link">Register</a>
          </p>

        </div>

      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
