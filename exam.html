<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam</title>
    <style>
        progress {
            appearance: none;
            width: 100%;
            height: 20px;
        }

        progress::-webkit-progress-bar {
            background-color: #b588a8;
            border-radius: 10px;
        }

        progress::-webkit-progress-value {
            background-color: #800f5e;
            border-radius: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 50px;
        }

        .nextBtn,
        .prevBtn {
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            background-color: #800f5e;
            color: white;
            cursor: pointer;
        }

        .index {
            padding: 5px 10px;
            border-radius: 20px;
            background-color: #b588a8;
            color: white;
        }

        .markBtn {
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            background-color: #b588a8;
            color: white;
            cursor: pointer;
        }

        .subBtn {
            background-color: #28A745;
            color: white;
            display: block;
            width: 20%;
            margin: 20px auto;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
        }

        .main {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .markList {
            background-color: #b588a8;
            height: 520px;
            width: 20%;
            border-radius: 10px;
        }

        .question {
            flex-grow: 1;
            text-align: center;
        }

        .title {
            font-size: 40px;

            margin-bottom: 15px;
        }

        .answer {
            display: flex;
            flex-direction: column;
            height: 200px;
            justify-content: space-between;
            padding: 50px 200px;
        }

        .radioInput {
            display: flex;
            align-items: center;
            gap: 5px;
            border: 2px solid #dad9d9;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 10px;
        }

        .radioInput:hover {
            background-color: #f3f3f3;
        }

        .radioInput input:checked+label {
            font-weight: bold;
        }

        .radioInput input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #800f5e;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .radioInput input[type="radio"]:checked::after {
            content: "";
            position: absolute;
            top: 3px;
            left: 3px;
            width: 12px;
            height: 12px;
            background-color: #800f5e;
            border-radius: 2px;
        }

        .mark {
            padding: 10px 80px;
            background-color: #800f5e;
            color: rgb(255, 255, 255);
            border-radius: 10px;
            margin: 10px;
            cursor: pointer;
        }

        .timer-container {
            text-align: center;
        }

        .timer {
            font-size: 30px;
            font-weight: bold;
        }

        .logoutBtn {
            position: fixed;
            top: 35px;
            right: 20px;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            background-color: #dc3545;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <button class="logoutBtn" onclick="logout()">Logout</button>
    <progress class="progress" value="1" max="10"></progress>
    <div class="timer-container">
        <span class="timer">30:00</span>
    </div>
    <div class="main">
        <div class="question">
            <p class="title"></p>
            <div class="answer"></div>
        </div>
        <div class="markList"></div>
    </div>
    <div class="controls">
        <div class="navigation">
            <button class="prevBtn">Previous</button>
            <span class="index">1</span>
            <button class="nextBtn">Next</button>
        </div>

        <button class="markBtn">Mark</button>
    </div>

    <button class="subBtn">Submit</button>
    <script src="exam.js"></script>
</body>

</html>
